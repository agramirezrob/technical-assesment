server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/products/ {
    proxy_pass http://products-api:8081/products/;
  }

  location = /api/products {
    proxy_pass http://products-api:8081/products;
  }

  location /api/clients/ {
    proxy_pass http://clients-api:8082/clients/;
  }

  location = /api/clients {
    proxy_pass http://clients-api:8082/clients;
  }

  location = /api/demo/orders {
    proxy_pass http://order-worker:8080/demo/orders;
    proxy_set_header Content-Type application/json;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
