spring:
  application:
    name: order-worker
  threads:
    virtual:
      enabled: true
server:
  port: ${SERVER_PORT}
management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  mongodb:
    uri: ${MONGODB_URI}
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
  clients:
    products-base-url: ${PRODUCTS_API_BASE_URL}
    clients-base-url: ${CLIENTS_API_BASE_URL}
  cache:
    ttl-seconds: ${CACHE_TTL_SECONDS}
